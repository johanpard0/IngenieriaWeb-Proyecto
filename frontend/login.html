<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catalina | Iniciar sesión</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#5c3a21,#a47148);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#5c3a21;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#5c3a21;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#3e2616;
}

.register{
    text-align:center;
    margin-top:15px;
}

.register a{
    color:#5c3a21;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="login-container">

<h1>Catalina</h1>

<form id="loginForm">

<input type="email" id="email" placeholder="Correo electrónico" required>

<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit">Iniciar sesión</button>

</form>

<div class="register">
¿No tienes cuenta? <a href="register.html">Regístrate</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const response = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

const data = await response.json()

if(response.ok){
alert("Bienvenido a Catalina")
window.location.href="/chat"
}else{
alert(data.detail || "Error al iniciar sesión")
}

})

</script>

</body>
</html>
