<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalina Chat</title>
<link rel="stylesheet" href="/static/css/chat.css">
</head>

<body>

<div class="layout">

<!-- LEFT -->
<div class="left-panel">
<h2>Archivos</h2>
<button class="upload">Subir archivo</button>
</div>

<!-- CHAT -->
<div class="chat-panel">

<div class="chat-header">
<img src="/static/images/Logosimple.png">
<span>Catalina Chatbot</span>
</div>

<div class="chat-messages" id="chatMessages">
<div class="bot-message">
Hola 👋 soy Catalina, ¿en qué puedo ayudarte?
</div>
</div>

<div class="chat-input">
<input type="text" id="messageInput" placeholder="Escribe tu mensaje...">
<button onclick="sendMessage()">Enviar</button>
</div>

</div>

<!-- RIGHT -->
<div class="right-panel">
<h2>Herramientas</h2>

<button onclick="generarPDF()">Exportar PDF</button>

</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("messageInput")
const message = input.value

if(message.trim() === "") return

const chat = document.getElementById("chatMessages")

// MENSAJE USUARIO
const userMsg = document.createElement("div")
userMsg.className="user-message"
userMsg.textContent = message
chat.appendChild(userMsg)

input.value=""

// LLAMADA BACKEND
const response = await fetch("/chatbot",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})

const data = await response.json()

// RESPUESTA BOT
const botMsg = document.createElement("div")
botMsg.className="bot-message"
botMsg.textContent = data.response

chat.appendChild(botMsg)

chat.scrollTop = chat.scrollHeight
}


// PDF
function generarPDF(){
window.open("/generate-pdf", "_blank")
}

</script>

</body>
</html>
