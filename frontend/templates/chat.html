<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalina Chat</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>

<body>

<div class="layout">
    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2>Archivos</h2>
        <input type="file" id="fileInput">
        <label for="fileInput" id="fileLabel">Seleccionar archivo</label>
        <button onclick="uploadFile()">Subir archivo</button>
    </div>

    <!-- CHAT -->
    <div class="chat-panel">
        <div class="chat-header">
            <img src="/static/images/Logosimple.png" alt="Logo Catalina">
            <span>Catalina Chatbot</span>

            <!-- Avatar de usuario en la parte superior derecha -->
            <div class="user-profile" onclick="toggleDropdown()">
                <div class="avatar">U</div> <!-- Avatar con inicial del usuario -->
                <div id="dropdown" class="dropdown">
                    <p id="userName">Usuario: </p>
                    <button onclick="logout()">Cerrar sesión</button>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="bot-message">
                ¡Hola! Soy Catalina, ¿en qué puedo ayudarte?
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <h2>Herramientas</h2>
        <button class="tool-btn" onclick="generarPDF()">Exportar PDF</button>
        <button class="tool-btn" onclick="verSalones()">Ver Salones</button>
        <button class="tool-btn" onclick="verProfesores()">Ver Profesores</button>
        <button class="tool-btn" onclick="llenarFormulario()">Llenar Formulario</button>
        <button class="tool-btn" onclick="verHistorial()">Historial de Consultas</button>
        <button class="tool-btn" onclick="contactarSoporte()">Contactar Soporte</button>
    </div>
</div>

<script>
// Función para manejar el logout (cerrar sesión)
function logout() {
    sessionStorage.removeItem('username');  // Eliminar el nombre de usuario de la sesión
    window.location.href = '/';  // Redirigir al inicio de sesión
}

// Mostrar el nombre del usuario en la parte superior derecha
function displayUserInfo() {
    const userName = sessionStorage.getItem('username');
    if (userName) {
        document.getElementById('userName').textContent = `Usuario: ${userName}`;
    }
}

// Mostrar y ocultar el dropdown de usuario
function toggleDropdown() {
    const dropdown = document.getElementById('dropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
}

// Redirigir al soporte
function contactarSoporte() {
    window.open('https://portalweb.ucatolica.edu.co/administrativos/index.php/servicios/soporte-tecnico/administracion/tecnicos-de-soporte', '_blank');
}

// Subir archivo
async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];

    if (!file) {
        alert("Por favor, selecciona un archivo.");
        return;
    }

    const formData = new FormData();
    formData.append('file', file);

    const response = await fetch('/uploadfile/', {
        method: 'POST',
        body: formData
    });

    const data = await response.json();
    alert(`Archivo ${data.filename} subido exitosamente.`);
}

// Ver salones
function verSalones() {
    window.location.href = "/salones";
}

// Ver profesores
function verProfesores() {
    window.location.href = "/profesores";
}

// Enviar mensaje con Enter o clic en botón
async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value;

    if (message.trim() === "") return;

    const chat = document.getElementById("chatMessages");

    // MENSAJE DEL USUARIO
    const userMsg = document.createElement("div");
    userMsg.className = "user-message";
    userMsg.textContent = message;
    chat.appendChild(userMsg);

    input.value = "";

    // Mostrar un indicador de carga mientras esperamos la respuesta
    const loadingMessage = document.createElement("div");
    loadingMessage.className = "bot-message";
    loadingMessage.textContent = "Cargando...";
    chat.appendChild(loadingMessage);

    chat.scrollTop = chat.scrollHeight;

    // LLAMADA AL BACKEND
    const response = await fetch("/chat/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
    });

    const data = await response.json();

    // Eliminar el mensaje de "Cargando..."
    loadingMessage.remove();

    // RESPUESTA DEL BOT
    const botMsg = document.createElement("div");
    botMsg.className = "bot-message";
    botMsg.textContent = data.respuesta;

    chat.appendChild(botMsg);

    chat.scrollTop = chat.scrollHeight;
}

// Permitir que el mensaje se envíe con Enter
function checkEnter(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

// Ejecutar al cargar la página
document.addEventListener('DOMContentLoaded', (event) => {
    displayUserInfo(); // Mostrar el nombre del usuario si está logueado
});
</script>

</body>
</html>
