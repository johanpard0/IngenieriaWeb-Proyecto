<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalina Chat</title>

<link rel="stylesheet" href="/static/css/chat.css">

<!-- ICONOS PRO -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="layout">

<!-- LEFT PANEL -->
<div class="left-panel">
<h2><i class="fas fa-folder"></i> Archivos</h2>
<input type="file" id="fileInput">
<button class="upload" onclick="uploadFile()">
    <i class="fas fa-upload"></i> Subir archivo
</button>
</div>

<!-- CHAT -->
<div class="chat-panel">

<div class="chat-header">

<div style="display:flex; align-items:center; gap:10px;">
<img src="/static/images/Logosimple.png" style="width:35px;">
<span>Catalina Chatbot</span>
</div>

<div class="user-profile">
<div class="avatar" id="avatarUser" onclick="toggleDropdown()">U</div>

<div id="dropdown" class="dropdown">
<p id="userName">Usuario</p>

<button onclick="abrirPerfil()">
<i class="fas fa-user"></i> Ver perfil
</button>

<button onclick="configuracion()">
<i class="fas fa-cog"></i> Configuración
</button>

<button onclick="toggleDarkMode()">
<i class="fas fa-moon"></i> Modo noche
</button>

<button onclick="verHistorial()">
<i class="fas fa-clock"></i> Historial
</button>

<button onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Cerrar sesión
</button>
</div>
</div>

</div>

<div class="chat-messages" id="chatMessages">
<div class="bot-message">Hola 👋 soy Catalina, ¿en qué puedo ayudarte?</div>
</div>

<div class="chat-input">
<input type="text" id="messageInput" placeholder="Escribe..." onkeypress="checkEnter(event)">
<button onclick="sendMessage()">
<i class="fas fa-paper-plane"></i>
</button>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
<h2><i class="fas fa-tools"></i> Herramientas</h2>

<button onclick="quickMsg('salones')">
<i class="fas fa-building"></i> Salones
</button>

<button onclick="quickMsg('profesores')">
<i class="fas fa-chalkboard-teacher"></i> Profesores
</button>

<button onclick="quickMsg('horario')">
<i class="fas fa-calendar"></i> Horarios
</button>

<button onclick="quickMsg('formulario')">
<i class="fas fa-file-alt"></i> Formulario
</button>

<button onclick="contactarSoporte()">
<i class="fas fa-headset"></i> Soporte
</button>

</div>

</div>

<script>

// PERFIL
function cargarUsuario(){
    const user = sessionStorage.getItem('username');

    if(user){
        document.getElementById('userName').textContent = "👤 " + user;
        document.getElementById('avatarUser').textContent = user.charAt(0).toUpperCase();
    }

    if(localStorage.getItem("darkMode") === "true"){
        document.body.classList.add("dark-mode");
    }
}

function toggleDropdown(){
    const d = document.getElementById('dropdown');
    d.style.display = d.style.display === 'block' ? 'none' : 'block';
}

function abrirPerfil(){
    const user = sessionStorage.getItem('username') || "Usuario";
    alert("👤 Usuario: " + user);
}

function configuracion(){
    alert("⚙️ Configuración disponible pronto");
}

function verHistorial(){
    quickMsg("historial");
}

function logout(){
    sessionStorage.removeItem('username');
    window.location.href = '/';
}

// MODO NOCHE
function toggleDarkMode(){
    document.body.classList.toggle("dark-mode");

    const isDark = document.body.classList.contains("dark-mode");
    localStorage.setItem("darkMode", isDark);
}

// CLICK AFUERA
window.addEventListener('click', function(e){
    const profile = document.querySelector('.user-profile');
    const dropdown = document.getElementById('dropdown');

    if(!profile.contains(e.target)){
        dropdown.style.display = 'none';
    }
});

// CHAT
function checkEnter(e){
    if(e.key === "Enter"){
        sendMessage();
    }
}

function quickMsg(text){
    document.getElementById("messageInput").value = text;
    sendMessage();
}

async function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(message === "") return;

    const chat = document.getElementById("chatMessages");

    const userMsg = document.createElement("div");
    userMsg.className = "user-message";
    userMsg.textContent = message;
    chat.appendChild(userMsg);

    input.value = "";

    const loading = document.createElement("div");
    loading.className = "bot-message";
    loading.textContent = "Catalina está escribiendo...";
    chat.appendChild(loading);

    chat.scrollTop = chat.scrollHeight;

    try{
        const res = await fetch("/chat/send", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        const data = await res.json();
        loading.remove();

        const botMsg = document.createElement("div");
        botMsg.className = "bot-message";
        botMsg.textContent = data.respuesta;

        chat.appendChild(botMsg);

    }catch(e){
        loading.textContent = "Error conectando con el servidor";
    }

    chat.scrollTop = chat.scrollHeight;
}

// OTROS
function contactarSoporte(){
    window.open("https://portalweb.ucatolica.edu.co/administrativos/index.php/servicios/soporte-tecnico/administracion/tecnicos-de-soporte","_blank");
}

async function uploadFile(){
    const file = document.getElementById('fileInput').files[0];

    if(!file){
        alert("Selecciona archivo");
        return;
    }

    const form = new FormData();
    form.append("file", file);

    await fetch('/uploadfile/',{
        method:"POST",
        body:form
    });

    alert("Archivo subido");
}

// INIT
document.addEventListener('DOMContentLoaded', cargarUsuario);

</script>

</body>
</html>
