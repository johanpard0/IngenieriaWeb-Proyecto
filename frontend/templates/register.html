<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalina | Registro</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

<div class="header">
  <img src="/static/images/Logosimple.png">
  <span>Catalina</span>
</div>

<div class="main">

  <div class="login register-box">

    <div class="logo">
      <img src="/static/images/Logosimple.png">
    </div>

    <h1>Crear cuenta</h1>
    <p>Registro de usuario</p>

    <form id="registerForm">

      <input 
        type="text" 
        id="nombre" 
        placeholder="Nombre completo"
        required
      >

      <input 
        type="text" 
        id="cedula" 
        placeholder="Cédula"
        required
      >

      <input 
        type="email" 
        id="username" 
        placeholder="Correo institucional"
        required
      >

      <input 
        type="password" 
        id="password" 
        placeholder="Contraseña"
        required
      >

      <button type="submit">Registrar</button>

    </form>

    <div class="links">
      ¿Ya tienes cuenta?
      <a href="/">Iniciar sesión</a>
    </div>

  </div>

</div>

<script>

const nombre = document.getElementById("nombre")
const cedula = document.getElementById("cedula")
const correo = document.getElementById("username")

// VALIDACIÓN NOMBRE
nombre.addEventListener("input", () => {
  if (!nombre.value.match(/^[A-Za-zÁÉÍÓÚáéíóúñÑ ]*$/)) {
    nombre.setCustomValidity("Solo se permiten letras")
  } else {
    nombre.setCustomValidity("")
  }
})

// VALIDACIÓN CÉDULA
cedula.addEventListener("input", () => {
  if (!cedula.value.match(/^[0-9]*$/)) {
    cedula.setCustomValidity("Solo se permiten números")
  } else {
    cedula.setCustomValidity("")
  }
})

// VALIDACIÓN CORREO INSTITUCIONAL
correo.addEventListener("input", () => {
  if (!correo.value.endsWith("@ucatolica.edu.co")) {
    correo.setCustomValidity("Debe ser correo institucional @ucatolica.edu.co")
  } else {
    correo.setCustomValidity("")
  }
})

// ENVÍO FORMULARIO
document.getElementById("registerForm").addEventListener("submit", async function(e){

  e.preventDefault()

  const dataUser = {
    nombre: nombre.value,
    cedula: cedula.value,
    username: correo.value,
    password: document.getElementById("password").value
  }

  const response = await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(dataUser)
  })

  const data = await response.json()

  if(response.ok){
    alert("Usuario creado correctamente")
    window.location.href="/"
  }else{
    alert(data.detail)
  }

})

</script>

</body>
</html>
